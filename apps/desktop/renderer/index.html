<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Strict CSP for the trusted UI (13). 'self' covers both the dev-server
      origin and the packaged file:// bundle. style-src 'unsafe-inline' and
      the explicit ws:// entries exist only for Vite dev/HMR style injection;
      no remote origin is ever allowed.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://localhost:* ws://127.0.0.1:*"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atomik</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
