<svg width="680" height="308" viewBox="0 0 680 308" xmlns="http://www.w3.org/2000/svg" role="img"><title>The three planes</title><desc>Doc 35: knowledge plane says what should be, ephemeral context serves one operation, execution-state plane says what a task will change and where it stands.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="308" fill="#FFFFFF"/><rect x="160" y="44" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="63.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Knowledge plane</text><text class="ts" x="340.0" y="82.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">bedrock · notes · ADRs — durable</text><line x1="340.0" y1="103" x2="340.0" y2="123" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="160" y="126" width="360" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="145.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Ephemeral context plane</text><text class="ts" x="340.0" y="164.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">context packets — rebuilt per call</text><line x1="340.0" y1="185" x2="340.0" y2="205" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="160" y="208" width="360" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="340.0" y="227.0" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Execution-state plane</text><text class="ts" x="340.0" y="246.0" text-anchor="middle" dominant-baseline="central" fill="#534AB7">coding paths + ledger — durable</text></svg>
