<svg width="680" height="332" viewBox="0 0 680 332" xmlns="http://www.w3.org/2000/svg" role="img"><title>Mechanical truth labeling</title><desc>Docs 06 and 28: source-backed is earned only by deterministic anchor match; everything else defaults to model-only; the verification router escalates when risk justifies.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="332" fill="#FFFFFF"/><rect x="200" y="44" width="280" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="61.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Deterministic anchor check</text><text class="ts" x="340.0" y="80.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">match against supplied selection</text><line x1="300" y1="98" x2="196" y2="140" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><line x1="380" y1="98" x2="484" y2="140" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="70" y="144" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="190.0" y="161.0" text-anchor="middle" dominant-baseline="central" fill="#085041">source-backed</text><text class="ts" x="190.0" y="180.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">mechanically earned</text><rect x="370" y="144" width="240" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="th" x="490.0" y="161.0" text-anchor="middle" dominant-baseline="central" fill="#633806">model-only (default)</text><text class="ts" x="490.0" y="180.0" text-anchor="middle" dominant-baseline="central" fill="#854F0B">model never self-grades</text><line x1="490" y1="198" x2="490" y2="236" stroke="#5F5E5A" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/><rect x="370" y="240" width="240" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="490.0" y="257.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Verification router</text><text class="ts" x="490.0" y="276.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">escalates when risk justifies</text></svg>
