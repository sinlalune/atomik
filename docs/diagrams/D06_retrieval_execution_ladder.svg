<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img"><title>Retrieval and execution ladder</title><desc>Docs 00 and 33: cheapest sufficient path, starting at the v0.6 rung zero of reusing an existing vault note, ending at cloud or live web.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="470" fill="#FFFFFF"/><rect x="150" y="44" width="380" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/><text class="th" x="340.0" y="61.0" text-anchor="middle" dominant-baseline="central" fill="#633806">Existing vault note</text><text class="ts" x="340.0" y="80.0" text-anchor="middle" dominant-baseline="central" fill="#854F0B">reuse before regeneration</text><line x1="340" y1="99" x2="340" y2="113" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="150" y="116" width="380" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="133.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Direct read / deterministic tool</text><text class="ts" x="340.0" y="152.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">files · deterministic tools</text><line x1="340" y1="171" x2="340" y2="185" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="150" y="188" width="380" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="205.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Lexical and structural retrieval</text><text class="ts" x="340.0" y="224.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">paths · headings · full-text</text><line x1="340" y1="243" x2="340" y2="257" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="150" y="260" width="380" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="277.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Local embeddings (optional)</text><text class="ts" x="340.0" y="296.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">after lexical baseline exists</text><line x1="340" y1="315" x2="340" y2="329" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="150" y="332" width="380" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="349.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Local model (when adequate)</text><text class="ts" x="340.0" y="368.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">measured, replaceable</text><line x1="340" y1="387" x2="340" y2="401" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="150" y="404" width="380" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="340.0" y="421.0" text-anchor="middle" dominant-baseline="central" fill="#712B13">Cloud model / live web</text><text class="ts" x="340.0" y="440.0" text-anchor="middle" dominant-baseline="central" fill="#993C1D">explicit, budgeted, traced</text><text class="ts" x="545" y="70" text-anchor="start" fill="#5F5E5A">cheapest</text><text class="ts" x="545" y="430" text-anchor="start" fill="#5F5E5A">costliest</text></svg>
