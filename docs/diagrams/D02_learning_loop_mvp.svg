<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img"><title>The learning loop (MVP)</title><desc>Short MVP loop from doc 02: open project, open source or note, select, ask AI, inspect bundle with evidence and receipt, accept a reviewable Markdown patch.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="560" fill="#FFFFFF"/><rect x="190" y="44" width="300" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="61.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Open project</text><text class="ts" x="340.0" y="80.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">a durable folder</text><line x1="340.0" y1="99" x2="340.0" y2="119" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="190" y="122" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="139.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Open source or note</text><text class="ts" x="340.0" y="158.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">PDF · web · capture · Markdown</text><line x1="340.0" y1="177" x2="340.0" y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="190" y="200" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="217.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Select a fragment</text><text class="ts" x="340.0" y="236.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">text · image region · code · math</text><line x1="340.0" y1="255" x2="340.0" y2="275" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="190" y="278" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="340.0" y="295.0" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Ask AI</text><text class="ts" x="340.0" y="314.0" text-anchor="middle" dominant-baseline="central" fill="#534AB7">typed intent + context scope</text><line x1="340.0" y1="333" x2="340.0" y2="353" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="190" y="356" width="300" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="340.0" y="373.0" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Inspect the bundle</text><text class="ts" x="340.0" y="392.0" text-anchor="middle" dominant-baseline="central" fill="#534AB7">answer · evidence · receipt · patch</text><line x1="340.0" y1="411" x2="340.0" y2="431" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="190" y="434" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="451.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Accept into Markdown</text><text class="ts" x="340.0" y="470.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">one clean reviewable diff</text><text class="ts" x="340" y="512" text-anchor="middle" fill="#5F5E5A">↻ loop: keep learning inside the app</text></svg>
