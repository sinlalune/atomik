<svg width="680" height="410" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Atomik dual-plane repository layout (ADR-009)</title>
<desc>One Git repository containing a code plane (apps, packages, tests, docs) and a knowledge plus execution plane (atomik-project with coding paths), booted by a tiny AGENTS.md file at the root.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.ts { font-size: 12px; font-weight: 400; }
</style>
</defs>

<rect x="40" y="40" width="600" height="350" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="64" y="66" fill="#444441">atomik/ — one Git repository (ADR-009)</text>

<rect x="190" y="84" width="300" height="56" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
<text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central" fill="#444441">AGENTS.md</text>
<text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">tiny bootloader · CLAUDE.md bridge</text>

<line x1="420" y1="140" x2="482" y2="172" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="64" y="180" width="276" height="190" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="202" y="206" text-anchor="middle" dominant-baseline="central" fill="#085041">Code plane</text>

<rect x="88" y="232" width="228" height="52" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="202" y="249" text-anchor="middle" dominant-baseline="central" fill="#085041">docs/</text>
<text class="ts" x="202" y="267" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">bedrock · adr · modules</text>

<rect x="88" y="298" width="228" height="44" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="202" y="320" text-anchor="middle" dominant-baseline="central" fill="#085041">apps · packages · tests</text>

<rect x="356" y="180" width="260" height="190" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="486" y="206" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Knowledge + execution plane</text>

<rect x="380" y="232" width="212" height="52" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="486" y="249" text-anchor="middle" dominant-baseline="central" fill="#3C3489">coding-paths/</text>
<text class="ts" x="486" y="267" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ACTIVE.md → CP-MVP-001</text>

<rect x="380" y="298" width="212" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="486" y="320" text-anchor="middle" dominant-baseline="central" fill="#3C3489">brainstorm/ · briefs/</text>
</svg>
