<svg width="680" height="176" viewBox="0 0 680 176" xmlns="http://www.w3.org/2000/svg" role="img"><title>Note lifecycle</title><desc>Doc 11 v0.6: notes move from seed to archived; archive is demotion, never deletion; retrieval and link proposals down-rank demoted notes.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="176" fill="#FFFFFF"/><rect x="44" y="50" width="104" height="36" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="96.0" y="68.0" text-anchor="middle" dominant-baseline="central" fill="#085041">seed</text><line x1="151" y1="68" x2="167" y2="68" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="170" y="50" width="104" height="36" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="222.0" y="68.0" text-anchor="middle" dominant-baseline="central" fill="#085041">growing</text><line x1="277" y1="68" x2="293" y2="68" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="296" y="50" width="104" height="36" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="348.0" y="68.0" text-anchor="middle" dominant-baseline="central" fill="#085041">evergreen</text><line x1="403" y1="68" x2="419" y2="68" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="422" y="50" width="104" height="36" rx="18" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="474.0" y="68.0" text-anchor="middle" dominant-baseline="central" fill="#444441">superseded</text><line x1="529" y1="68" x2="545" y2="68" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="548" y="50" width="104" height="36" rx="18" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="600.0" y="68.0" text-anchor="middle" dominant-baseline="central" fill="#444441">archived</text><text class="ts" x="340" y="122" text-anchor="middle" fill="#5F5E5A">archive = demotion, never deletion — Git keeps history</text><text class="ts" x="340" y="144" text-anchor="middle" fill="#5F5E5A">link proposals and retrieval down-rank superseded / archived notes</text></svg>
