<svg width="680" height="550" viewBox="0 0 680 550" xmlns="http://www.w3.org/2000/svg" role="img"><title>Coding agent bootstrap protocol</title><desc>Doc 22: every session boots from files, verifies the work ledger against reality, executes one step, and persists everything before moving on.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="550" fill="#FFFFFF"/><rect x="180" y="44" width="320" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="61.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Read AGENTS.md</text><text class="ts" x="340.0" y="80.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">the bootloader</text><line x1="340.0" y1="99" x2="340.0" y2="117" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="180" y="120" width="320" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text class="th" x="340.0" y="137.0" text-anchor="middle" dominant-baseline="central" fill="#444441">Open ACTIVE.md</text><text class="ts" x="340.0" y="156.0" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">project index → active path</text><line x1="340.0" y1="175" x2="340.0" y2="193" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="180" y="196" width="320" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="340.0" y="213.0" text-anchor="middle" dominant-baseline="central" fill="#712B13">Verify ledger vs reality</text><text class="ts" x="340.0" y="232.0" text-anchor="middle" dominant-baseline="central" fill="#993C1D">git · commit · tests</text><line x1="340.0" y1="251" x2="340.0" y2="269" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="180" y="272" width="320" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="289.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Read required docs</text><text class="ts" x="340.0" y="308.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">note conditional triggers</text><line x1="340.0" y1="327" x2="340.0" y2="345" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="180" y="348" width="320" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="340.0" y="365.0" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Execute one step</text><text class="ts" x="340.0" y="384.0" text-anchor="middle" dominant-baseline="central" fill="#534AB7">only one at a time</text><line x1="340.0" y1="403" x2="340.0" y2="421" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/><rect x="180" y="424" width="320" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="340.0" y="441.0" text-anchor="middle" dominant-baseline="central" fill="#085041">Persist in same work unit</text><text class="ts" x="340.0" y="460.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">code · tests · docs · ledger · log</text><text class="ts" x="340" y="502" text-anchor="middle" fill="#5F5E5A">↻ next step — or next session resumes from the ledger</text></svg>
