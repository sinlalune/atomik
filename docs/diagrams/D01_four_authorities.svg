<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img"><title>The four authorities</title><desc>Constitutional distinction: file, epistemic, editorial, and execution-economics authority are separate judgments over the same object.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}.th{font-size:14px;font-weight:500}.ts{font-size:12px;font-weight:400}</style></defs><rect x="0" y="0" width="680" height="220" fill="#FFFFFF"/><rect x="56" y="48" width="280" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text class="th" x="196.0" y="69.0" text-anchor="middle" dominant-baseline="central" fill="#085041">File authority</text><text class="ts" x="196.0" y="88.0" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">files are the durable record</text><rect x="344" y="48" width="280" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text class="th" x="484.0" y="69.0" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Epistemic authority</text><text class="ts" x="484.0" y="88.0" text-anchor="middle" dominant-baseline="central" fill="#534AB7">evidence supports claims</text><rect x="56" y="132" width="280" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text class="th" x="196.0" y="153.0" text-anchor="middle" dominant-baseline="central" fill="#712B13">Editorial authority</text><text class="ts" x="196.0" y="172.0" text-anchor="middle" dominant-baseline="central" fill="#993C1D">humans accept what becomes durable</text><rect x="344" y="132" width="280" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/><text class="th" x="484.0" y="153.0" text-anchor="middle" dominant-baseline="central" fill="#633806">Execution economics</text><text class="ts" x="484.0" y="172.0" text-anchor="middle" dominant-baseline="central" fill="#854F0B">every action can show its cost</text></svg>
